workflows:
  # ─────────────────────────────────────────────────────────────────────────
  # Smoke build — no signing, no upload. Run this first to confirm the
  # project compiles on macOS / ML Kit pods resolve / Podfile is correct.
  # ─────────────────────────────────────────────────────────────────────────
  ios-unsigned:
    name: iOS · unsigned smoke build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Pod install
        script: |
          cd ios
          pod install
      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos
        ignore_failure: true
      - name: Build iOS (no codesign)
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app
      - /tmp/xcodebuild_logs/*.log

  # ─────────────────────────────────────────────────────────────────────────
  # Signed build that uploads the IPA to TestFlight.
  # Requires in Codemagic UI (Teams → Integrations):
  #   1. App Store Connect API key integration named: appstore_api_key
  #   2. The app created in App Store Connect with bundle id ru.volovod.myskin
  # ─────────────────────────────────────────────────────────────────────────
  ios-testflight:
    name: iOS · TestFlight release
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: appstore_api_key
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_STORE_APPLE_ID: "6769034673"
        BUNDLE_ID: "ru.volovod.myskin"
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Pod install
        script: |
          cd ios
          pod install
      - name: Set up code signing (create cert + profile, register in keychain)
        script: |
          set -ex
          keychain initialize

          PRIVATE_KEY=/tmp/cm_distribution.key
          openssl genrsa -out "$PRIVATE_KEY" 2048

          # Revoke every existing distribution certificate before trying to
          # create a new one. Past failed Codemagic runs leave orphaned certs
          # on Apple's side whose private key we don't have on this build
          # machine; they only count against the 2-cert-per-team limit and
          # block fetch-signing-files --create with HTTP 409. Doing it here
          # makes the pipeline self-healing — no manual revoke step in the
          # Apple Developer Portal each time the build fails halfway.
          for type in IOS_DISTRIBUTION DISTRIBUTION; do
            echo "--- Listing existing $type certs ---"
            JSON=$(app-store-connect list-certificates --type "$type" --json 2>/dev/null || echo "[]")
            ids=$(printf '%s' "$JSON" | python3 -c 'import sys,json;d=json.load(sys.stdin);print("\n".join(c.get("id","") for c in (d if isinstance(d,list) else [])))' 2>/dev/null || true)
            for id in $ids; do
              [ -n "$id" ] || continue
              echo "Revoking stale $type certificate $id"
              app-store-connect certificates delete "$id" 2>/dev/null \
                || app-store-connect delete-certificate "$id" 2>/dev/null \
                || true
            done
          done

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key "@file:$PRIVATE_KEY" \
            --create

          keychain add-certificates
          xcode-project use-profiles

          echo "--- codesigning identities ---"
          security find-identity -v -p codesigning
          echo "--- provisioning profiles ---"
          ls -la "/Users/builder/Library/Developer/Xcode/UserData/Provisioning Profiles/" || true
      - name: Bump build number from latest TestFlight build
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          export NEW_BUILD_NUMBER=$((LATEST + 1))
          echo "BUILD_NUMBER=$NEW_BUILD_NUMBER" >> $CM_ENV
          echo "Next build number: $NEW_BUILD_NUMBER"
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
