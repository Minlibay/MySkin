workflows:
  # ─────────────────────────────────────────────────────────────────────────
  # Smoke build — no signing, no upload. Run this first to confirm the
  # project compiles on macOS / ML Kit pods resolve / Podfile is correct.
  # ─────────────────────────────────────────────────────────────────────────
  ios-unsigned:
    name: iOS · unsigned smoke build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Pod install
        script: |
          cd ios
          pod install
      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos
        ignore_failure: true
      - name: Build iOS (no codesign)
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app
      - /tmp/xcodebuild_logs/*.log

  # ─────────────────────────────────────────────────────────────────────────
  # Signed build that uploads the IPA to TestFlight.
  # Requires in Codemagic UI (Teams → Integrations):
  #   1. App Store Connect API key integration named: appstore_api_key
  #   2. The app created in App Store Connect with bundle id ru.volovod.myskin
  # ─────────────────────────────────────────────────────────────────────────
  ios-testflight:
    name: iOS · TestFlight release
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: appstore_api_key
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_STORE_APPLE_ID: "6769034673"
        BUNDLE_ID: "ru.volovod.myskin"
    scripts:
      - name: Discover Codemagic CLI flag names (diagnostic, runs first)
        script: |
          app-store-connect --version || true
          echo "=== certificates create --help ==="
          app-store-connect certificates create --help 2>&1 || true
          echo "=== fetch-signing-files --help ==="
          app-store-connect fetch-signing-files --help 2>&1 || true
          echo "=== profiles create --help ==="
          app-store-connect profiles create --help 2>&1 || true
